<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>پنل ترید | -Crypto-</title>
  </head>
  <body
    class="bg-gray-50 text-gray-900 dark:bg-[#0b0e11] dark:text-white transition-colors duration-500"
  >
    <nav
      class="sticky top-0 z-50 bg-white/80 dark:bg-white/5 backdrop-blur-lg border-b border-gray-200 dark:border-white/5 px-6 py-4 flex justify-between items-center"
    >
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center shadow-lg"
        >
          <span class="text-black font-black text-xl">C</span>
        </div>
        <h1 class="text-xl font-black tracking-tight hidden md:block">
          CRYPTO<span class="text-yellow-500"></span>
        </h1>
      </div>

      <button
        id="theme-toggle"
        class="p-3 rounded-2xl bg-gray-200 dark:bg-white/5 border border-transparent dark:border-white/10 hover:bg-gray-300 dark:hover:bg-white/10 transition-all"
      >
        <span class="dark:hidden">🌙</span>
        <span class="hidden dark:inline">☀️</span>
      </button>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
      <section
        class="flex flex-col md:flex-row justify-between items-center gap-6"
      >
        <div>
          <h2 class="text-4xl font-black mb-2">بازار ارزها</h2>
          <p class="text-gray-500 dark:text-gray-400 text-sm">
            قیمت‌های لحظه‌ای بدون نیاز به اینترنت جهانی
          </p>
        </div>
        <div class="relative w-full md:w-96">
          <input
            id="search"
            type="text"
            placeholder="جستجو..."
            class="w-full p-4 bg-white dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-2xl focus:outline-none focus:border-yellow-500 transition-all text-gray-900 dark:text-white"
          />
        </div>
      </section>

      <div
        id="coin-container"
        class="bg-white dark:bg-white/5 border border-gray-200 dark:border-transparent rounded-[2.5rem] overflow-hidden shadow-xl dark:shadow-2xl"
      ></div>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
